services:
  miniflux:
    image: miniflux/miniflux:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/bin/miniflux", "-healthcheck", "auto"]
    ports:
      - "8082:8080"
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASS}@${DATABASE_HOST}:${DATABASE_PORT}/miniflux?sslmode=require
      - RUN_MIGRATIONS=1
