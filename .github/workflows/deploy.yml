name: deploy

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
        description: "Service directory name (e.g., 'groceries', 'no-time-to-explain')"
      artifact:
        required: true
        type: string
        description: "Artifact URL (passed as ARTIFACT build arg)"
      environment:
        required: false
        type: string
        default: "production"
      url:
        required: false
        type: string
  workflow_dispatch:
    inputs:
      service:
        required: true
        type: string
        description: "Service directory name"
      artifact:
        required: true
        type: string
        description: "Artifact URL"
      environment:
        required: false
        type: string
        default: "production"
      url:
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.url }}
    concurrency:
      group: deploy-${{ inputs.service }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write # Required for Tailscale OIDC workload identity
    env:
      DEPLOY_HOST: "terra"
      DEPLOY_USER: "rnixon"
      DEPLOY_PATH: "/mnt/services"
      # Tailscale OIDC configuration - not secrets, safe to hardcode
      # Get these from: https://login.tailscale.com/admin/settings/oauth
      TAILSCALE_OAUTH_CLIENT_ID: "TnR1x6KTuY81CNTRL-kSZ1yprV5611CNTRL"
      TAILSCALE_AUDIENCE: "api.tailscale.com/TnR1x6KTuY81CNTRL-kSZ1yprV5611CNTRL"
    steps:
      - name: Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ env.TAILSCALE_OAUTH_CLIENT_ID }}
          audience: ${{ env.TAILSCALE_AUDIENCE }}
          tags: tag:ci
          version: latest
          ping: ${{ env.DEPLOY_HOST }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
            "cd ${{ env.DEPLOY_PATH }} && mise run deploy ${{ inputs.service }} '${{ inputs.artifact }}'"
