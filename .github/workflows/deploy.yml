name: deploy

on:
  workflow_call:
    inputs:
      artifact-name:
        required: false
        type: string
        default: "artifact"
        description: "Name of the GitHub Actions artifact to download"
      filename:
        required: true
        type: string
        description: "Filename of the artifact (e.g., 'my-service.tgz')"
      environment:
        required: false
        type: string
        default: "production"
        description: "Deployment environment"
      url:
        required: false
        type: string
        description: "Deployment URL for environment tracking"
  workflow_dispatch:
    inputs:
      artifact-name:
        required: false
        type: string
        default: "artifact"
      filename:
        required: true
        type: string
      environment:
        required: false
        type: string
        default: "production"
      url:
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.url }}
    concurrency:
      group: deploy-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write # Required for Tailscale OIDC workload identity
    env:
      DEPLOY_HOST: "terra"
      DEPLOY_USER: "rnixon"
      DEPLOY_PATH: "/mnt/services"
      # Tailscale OIDC configuration - not secrets, safe to hardcode
      # Get these from: https://login.tailscale.com/admin/settings/oauth
      TAILSCALE_OAUTH_CLIENT_ID: "TnR1x6KTuY81CNTRL-kSZ1yprV5611CNTRL"
      TAILSCALE_AUDIENCE: "api.tailscale.com/TnR1x6KTuY81CNTRL-kSZ1yprV5611CNTRL"
    steps:
      - name: Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ env.TAILSCALE_OAUTH_CLIENT_ID }}
          audience: ${{ env.TAILSCALE_AUDIENCE }}
          tags: tag:ci
          version: latest
          ping: ${{ env.DEPLOY_HOST }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}

      - name: Upload artifact to host
        id: upload
        run: |
          # Extract service name from repository (e.g., "taiidani/groceries" -> "groceries")
          SERVICE="${{ github.repository }}"
          SERVICE="${SERVICE##*/}"

          # Create service artifact directory on deploy host
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
            "mkdir -p ${{ env.DEPLOY_PATH }}/${SERVICE}/artifacts"

          # Upload with full filename
          scp ./${{ inputs.filename }} \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/${SERVICE}/artifacts/${{ inputs.filename }}

          # Also upload as "latest.tgz" for local development convenience
          scp ./${{ inputs.filename }} \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/${SERVICE}/artifacts/latest.tgz

          # Set service name and artifact path for deploy step
          echo "service=${SERVICE}" >> "$GITHUB_OUTPUT"
          echo "artifact=artifacts/${{ inputs.filename }}" >> "$GITHUB_OUTPUT"

      - name: Deploy service
        run: |
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
            "cd ${{ env.DEPLOY_PATH }} && mise run deploy ${{ steps.upload.outputs.service }} '${{ steps.upload.outputs.artifact }}'"
