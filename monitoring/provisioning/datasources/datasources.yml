apiVersion: 1

# Remove any previously-provisioned copies of these datasources before
# (re)creating them below. This handles the one-time migration where they were
# first provisioned without a fixed UID: changing an existing datasource's UID
# otherwise fails with "data source not found". Safe to keep permanently --
# it's a no-op on a fresh install.
deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Loki
    orgId: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  # --- Logs ---
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: false
