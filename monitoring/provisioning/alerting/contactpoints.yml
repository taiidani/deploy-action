apiVersion: 1

# The webhook URL comes from the DISCORD_WEBHOOK_URL environment variable,
# injected into the Grafana container by fnox (see the repo-root fnox.toml).
# Grafana interpolates $DISCORD_WEBHOOK_URL at provisioning time.
contactPoints:
  - orgId: 1
    name: Discord
    receivers:
      - uid: discord-homelab
        type: discord
        disableResolveMessage: false
        settings:
          url: $DISCORD_WEBHOOK_URL
