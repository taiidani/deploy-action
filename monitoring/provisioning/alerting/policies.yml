apiVersion: 1

# The notification policy tree is a single resource; provisioning it overwrites
# the entire tree. Here every alert routes to the Discord contact point.
policies:
  - orgId: 1
    receiver: Discord
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
