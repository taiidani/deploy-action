# Tempo single-binary configuration (Tempo 3.x). Alloy agents on each host
# receive OTLP traces from local apps and forward them here; Grafana queries
# them over HTTP.
#
# Tempo 3.0 removed the standalone `ingester` and `compactor` modules. In
# single-binary mode the distributor pushes directly to the live-store, and
# compaction/retention is handled by the backend scheduler + worker.
stream_over_http_enabled: true

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

# 30-day retention, matching Prometheus and Loki. Retention is enforced by the
# backend scheduler (which plans compaction jobs) and the worker (which runs
# them); both need the value.
backend_scheduler:
  provider:
    compaction:
      compaction:
        block_retention: 720h

backend_worker:
  compaction:
    block_retention: 720h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# Home lab; no phoning home.
usage_report:
  reporting_enabled: false
