# Tempo single-binary configuration. Alloy agents on each host receive OTLP
# traces from local apps and forward them here; Grafana queries them over HTTP.
stream_over_http_enabled: true

server:
  http_listen_port: 3200
  grpc_listen_port: 9097 # distinct from Loki's 9096 to avoid confusion

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m # cut blocks quickly so traces show up in Grafana fast

compactor:
  compaction:
    block_retention: 720h # 30 days, matches Prometheus and Loki

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
