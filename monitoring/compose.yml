services:
  grafana:
    image: grafana/grafana-enterprise:13.1.0
    restart: unless-stopped
    environment:
      - GF_SERVER_ROOT_URL=https://taiidani.com/
      # Consumed by alerting provisioning (provisioning/alerting/contactpoints.yml).
      - DISCORD_WEBHOOK_URL=${GRAFANA_DISCORD_WEBHOOK}
    ports:
      - "3900:3000"
    volumes:
      - "../data/monitoring/grafana:/var/lib/grafana"
      - "./provisioning:/etc/grafana/provisioning"
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:v3.13.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - "./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "../data/monitoring/prometheus:/prometheus"
    ports:
      - "9095:9090"

  # Log aggregation. Per-host Grafana Alloy agents (see ../alloy/) push Docker
  # container logs here. LAN-only (port 3100) so off-host agents can reach it.
  loki:
    image: grafana/loki:3.7.3
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - "./loki/loki-config.yml:/etc/loki/loki-config.yml:ro"
      - "../data/monitoring/loki:/loki"
    ports:
      - "3100:3100"

  # Distributed trace storage. Per-host Grafana Alloy agents (see ../alloy/)
  # receive OTLP traces from local apps and forward them here. LAN-only so
  # off-host agents can reach it.
  tempo:
    image: grafana/tempo:3.0.2
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo-config.yml
    volumes:
      - "./tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro"
      - "../data/monitoring/tempo:/var/tempo"
    ports:
      - "3200:3200" # Tempo query API (Grafana datasource)
      # OTLP gRPC receiver. Published on host 4417 because the local Alloy on
      # this host already binds 4317 for its own OTLP receiver.
      - "4417:4317"
