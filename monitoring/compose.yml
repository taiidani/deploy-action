services:
  grafana:
    image: grafana/grafana-enterprise
    restart: unless-stopped
    environment:
      - GF_SERVER_ROOT_URL=https://taiidani.com/
      # Consumed by alerting provisioning (provisioning/alerting/contactpoints.yml).
      - DISCORD_WEBHOOK_URL=${GRAFANA_DISCORD_WEBHOOK}
    ports:
      - "3900:3000"
    volumes:
      - "./data/grafana:/var/lib/grafana"
      - "./provisioning:/etc/grafana/provisioning"
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - "./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "./data/prometheus:/prometheus"
    ports:
      - "9095:9090"

  # Log aggregation. Per-host Grafana Alloy agents (see ../alloy/) push Docker
  # container logs here. LAN-only (port 3100) so off-host agents can reach it.
  loki:
    image: grafana/loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - "./loki/loki-config.yml:/etc/loki/loki-config.yml:ro"
      - "./data/loki:/loki"
    ports:
      - "3100:3100"
