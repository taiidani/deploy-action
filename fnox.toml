default_provider = "onepass"

[providers.onepass]
type = "1password"
vault = "Development"

[secrets]
"DATABASE_USER"= { provider = "onepass", value = "Postgres/username" }
"DATABASE_PASS"= { provider = "onepass", value = "Postgres/password" }
"GITHUB_WEBHOOK_SECRET"= { provider = "onepass", value = "GitHub Deployer App/webhook secret key" }

# Uptime
"DO_TOKEN"= { provider = "onepass", value = "DigitalOcean/credential" }

# Lil Dumpster
"LIL_DUMPSTER_DISCORD_TOKEN"= { provider = "onepass", value = "lil-dumpster Discord Token/credential" }

# No Time To Explain
"NTTE_DISCORD_TOKEN"= { provider = "onepass", value = "no-time-to-explain Discord/token" }
"NTTE_DISCORD_CLIENT_ID"= { provider = "onepass", value = "no-time-to-explain Discord/username" }
"NTTE_DISCORD_CLIENT_SECRET"= { provider = "onepass", value = "no-time-to-explain Discord/credential" }

# Servarr
"WIREGUARD_PRIVATE_KEY"= { provider = "onepass", value = "servarr wireguard private key/credential" }

# TFC Agent
"TFC_AGENT_TOKEN"= { provider = "onepass", value = "tfc-agent/credential" }

# Grafana Alerting
"GRAFANA_DISCORD_WEBHOOK"= { provider = "onepass", value = "Grafana Alerting Discord/webhook" }
