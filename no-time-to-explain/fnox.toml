default_provider = "onepass"

[providers.onepass]
type = "1password"
vault = "Development"

[secrets]
"NTTE_DISCORD_TOKEN"= { provider = "onepass", value = "no-time-to-explain Discord/token" }
"NTTE_DISCORD_CLIENT_ID"= { provider = "onepass", value = "no-time-to-explain Discord/username" }
"NTTE_DISCORD_CLIENT_SECRET"= { provider = "onepass", value = "no-time-to-explain Discord/credential" }
