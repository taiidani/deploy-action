services:
  ryannixon:
    image: taiidani/uptime:latest
    restart: unless-stopped
    environment:
      DO_TOKEN: "${DO_TOKEN}"
      DO_DOMAIN: "ryannixon.com"
      DO_UPDATE_RECORDS: "home"

  taiidani:
    image: taiidani/uptime:latest
    restart: unless-stopped
    environment:
      DO_TOKEN: "${DO_TOKEN}"
      DO_DOMAIN: "taiidani.com"
      DO_UPDATE_RECORDS: "@,home"

  ryannixon_dev:
    image: taiidani/uptime:latest
    restart: unless-stopped
    environment:
      DO_TOKEN: "${DO_TOKEN}"
      DO_DOMAIN: "ryannixon.dev"
      DO_UPDATE_RECORDS: "@"

  guessmyword:
    image: taiidani/uptime:latest
    restart: unless-stopped
    environment:
      DO_TOKEN: "${DO_TOKEN}"
      DO_DOMAIN: "guessmyword.xyz"
      DO_UPDATE_RECORDS: "@"
