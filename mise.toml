[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[settings]
env_cache = true

[env]
_.fnox-env = { tools = true }

[tools]
1password = "2.33.0-beta.02"
fnox = "latest"

[tasks.deploy]
description = "Deploy a service with optional artifact"
run = """
#!/usr/bin/env bash
set -e

SERVICE="${1:?Service name required}"
ARTIFACT="${2:-}"

echo "🚀 Deploying service: $SERVICE"

# Navigate to service directory
cd "$SERVICE"

# Deploy with or without artifact
if [ -n "$ARTIFACT" ]; then
  echo "📦 Deploying with artifact: $ARTIFACT"
  ARTIFACT="$ARTIFACT" docker compose up -d --build --wait
else
  echo "📦 Deploying without artifact..."
  docker compose up -d --build --wait
fi

# Show status
echo ""
echo "✅ Deployment complete!"
docker compose ps
"""
