[tools]
fnox = "latest"
gh = "latest"
"github:taiidani/groceries" = "latest"
"github:taiidani/no-time-to-explain" = "latest"
go = "latest"

[tasks.deploy]
description = "Deploy a service"
usage = '''
arg "<service>" help="Service name to deploy"
'''
run = """
#!/usr/bin/env bash
set -e

echo "📦 Staging service: ${usage_service?}"
mkdir -p artifacts
cp -f $(which ${usage_service?}) artifacts/${usage_service?}

echo "🏗️ Building service: ${usage_service?}"
docker build -t taiidani/${usage_service?} --build-arg NAME=${usage_service?} .

echo "🚀 Deploying service: ${usage_service?}"
cd ${usage_service?}
fnox exec --if-missing=error -- docker compose up -d --build --wait

# Show status
echo ""
echo "✅ Deployment complete!"
fnox exec --if-missing=error -- docker compose ps
"""
